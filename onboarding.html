<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Tools - Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            overflow: hidden;
        }
        
        #app {
            width: 100vw;
            height: 100vh;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color-scheme: dark;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script type="module">
        import { createApp } from 'vue';
        import OnboardingWindow from './src/components/OnboardingWindow.vue';
        
        // Create Vue app instance
        const app = createApp(OnboardingWindow);
        
        // Handle setup completion
        app.config.globalProperties.$onSetupComplete = () => {
            console.log('Setup completed - closing onboarding window');
            // Close onboarding window and show tray
            if (window.__TAURI__?.window?.getCurrent) {
                window.__TAURI__.window.getCurrent().then(win => {
                    win.close();
                }).catch(e => {
                    console.error('Failed to close onboarding window:', e);
                });
            }
        };
        
        // Make close function available
        window.closeOnboarding = () => {
            if (window.__TAURI__?.window?.getCurrent) {
                window.__TAURI__.window.getCurrent().then(win => {
                    win.close();
                }).catch(e => {
                    console.error('Failed to close:', e);
                });
            }
        };
        
        // Mount the app
        app.mount('#app');
        
        // Auto-focus for keyboard navigation
        setTimeout(() => {
            const firstInput = document.querySelector('input, textarea, button');
            if (firstInput) {
                firstInput.focus();
            }
        }, 100);
    </script>
</body>
</html>
