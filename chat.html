<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            overflow: hidden;
        }
        
        #app {
            width: 100vw;
            height: 100vh;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color-scheme: dark;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script type="module">
        import { createApp } from 'vue';
        import ChatWindow from './src/components/ChatWindow.vue';
        
        // Get parameters from URL or window object
        const urlParams = new URLSearchParams(window.location.search);
        const operation = urlParams.get('operation') || window.operation || 'Chat';
        const initialText = urlParams.get('text') || window.initialText || '';
        const title = urlParams.get('title') || window.chatTitle || 'AI Chat';
        const instruction = urlParams.get('instruction') || window.instruction || '';
        
        // Create Vue app instance
        const app = createApp(ChatWindow, {
            operation: operation,
            initialText: initialText,
            title: title,
            instruction: instruction
        });
        
        // Mount the app
        app.mount('#app');
    </script>
</body>
</html>
