name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.1.1). Defaults to the tag that triggered the run, or the latest v* tag when run manually without inputs.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            latest=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
            echo "name=$latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved tag: ${{ steps.tag.outputs.name }}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run build
        env:
          CI: 'true'

      - name: List built bundles
        shell: bash
        run: |
          echo "Bundle directory contents:"
          ls -la src-tauri/target/release/bundle/ 2>/dev/null || true
          echo "---"
          find src-tauri/target/release/bundle -type f \( -name '*.msi' -o -name '*.exe' \) -print

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
